# Global parameters
[global]
	dns forwarder = 8.8.8.8
	netbios name = DC1
	realm = LAB.LOCAL
	server role = active directory domain controller
	workgroup = LAB
	idmap_ldb:use rfc2307 = yes

[sysvol]
	path = /var/lib/samba/sysvol
	read only = No

[netlogon]
	path = /var/lib/samba/sysvol/lab.local/scripts
	read only = No
[Informatique]
   comment = Partage du departement Informatique
   path = /srv/partage/informatique
   valid users = @GRP-Informatique
   read only = No
   browseable = Yes
   create mask = 0660
   directory mask = 0770
   force user = root
[RH]
   comment = Partage Ressources Humaines
   path = /srv/partage/rh
   valid users = @GRP-RH
   read only = No
   browseable = Yes
   create mask = 0660
   directory mask = 0770

[Commun]
   comment = Partage commun a tous les employes
   path = /srv/partage/commun
   valid users = @"Domain Users"
   read only = No
   browseable = Yes
